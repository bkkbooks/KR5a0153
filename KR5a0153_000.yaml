front:
  text: 修真歷驗鈔圖并序調七夫至道真旨以凝性鍊形長生為上所謂凝性者心靈也乃內觀不動湛然無為焉雖云凝心一也乃有二得二得者謂住心空心若凝住心則身境與道同形性俱超此真得長生不死髙真妙道也若凝空心即性超而身沈此得脫腔尸解之下法也蓋凝住心無心即真道自會名曰虛無之身實有之質若凝空心忘空即空無自合名曰虛有之身實無之質此得性遺形之妙不得鍊形之要名謂清靈善爽之鬼故經訣云下仙者脫腔尸解之法是也凡此二説成道之旨若得性遺形雖速成然不契真道之旨蓋上士保生者以為斃法而不修也若凝住心形性俱得者壽延萬嵗名曰仙人又鍊身成氣萬年名曰真人又萬年鍊氣成神名曰神人又鍊神三千年名曰至人又鍊至人三千年成道人而證高真之果此道為上品之真耳及三萬六千年至道方具然初學凡人習之者如毛成之者如角於是無上法母為太上道君説元精經令救度好生保命之人蓋古有龍虎經指天地自然默生還丹夫自然還丹者按上經説一千八十年生真金礦真金礦一千八十年生真丹砂真丹砂一千八十年生真水銀真水銀一千八十年成還丹為得天地隂陽五行真氣都合四千三百二十年元精結成出名山幽靜巖石之間自成成時光照千里上真仙官降下採之凡學者難得之又元精法母慜念修行之人遂令以時代年採虛無之氣成真金金成丹砂砂成水銀合三才為用以法促捉四千三百二十年隂陽元氣就十二箇月感應而生成還丹備矣服之便證無上至道白日升天又古仙得道聖人猶恐初學之士一年之內寒暑侵傷又今將初地聖藥製凡藥成靈藥生小紫河車天生黃芽為延駐還丹服餌者定命長生漸可登真唯末有羽化之大功此並依師口訣及解真經之要妙不顯者今略而顯之以凡證聖以外曉內述易鑒難集為圖論將俟好生君子比驗矣立一十二圖表一十二辰位全聖功神明之道隂符經曰日月有數大小有定聖功生焉神明出焉此之謂也及各證注如後
