body:
  text: 三十輻共一轂圖經曰三十輻共一轂河上公曰古者之車三十輻共一榖中有孔故福共輳之法一月之數也蓋以小制大以寡御衆隂符經云日月有數大小有定是也當其無有車之用莊子曰無用之為用大矣一輻者凡車亦無用也日月要訣三十七字法曰一艾三爻五爻七爻十爻十三爻十五爻十七爻二十一爻二十三爻二十五爻二十七交三十爻周而復始四千三百二十年元氣生此歌曰時代日月替成年周而復始道自然十月脫胎九轉滿卯卯者玉兔之位火木為赤日陽符用事也酉酉者金雞之位金水為黑月雞符用事也二意左旋右轉也對相看三萬六千神氣足五元在內正元者四千三百二十年元氣也共成丹驅除邪毒因慈盡服之便上大羅天日火月火法今法及元君隂君古嵩子碧通子等行符開落三花在上弦花即符也古法開落三花在下弦法曰律吕者隂陽之位也陽為律隂為吕青霞子曰一陽生為春夏一隂生為秋冬隂終坤陽終乾子丑寅為眷卯辰巳為夏午未申為秋酉戌亥為冬凡此圖者日月火境之要妙也若不悟此法象即還丹遠矣採真鉛汞圖夫鉛者玄元之泉也泉者水之源也人但見泉水流出于石窟之中奔騰莫知泉源自何而至也亦如元氣生育萬物成熟莫見元氣從何而來也故道經云徵妙玄通深不可識夫唯不可識故強為之容是謂無狀之狀焉夫天輪在旋五星與日月右轉火鉛象日朱汞象月月行其疾一日一夜行十三度日行其遲一日一夜行一度月一月一周天日一年一周天凡日月一年十二合成歲生化萬物要在十二卦周而復始而九還氣足鉛汞神具而成金丹矣故經云日月有遲疾藥性有燥縵此之是也歌曰遲為日疾為月何用多囉亂分别真鉛本是火宗精真汞好飛含赤血男精女血既相包血生肉兮精産骨全藉良媒與結婚養成赤子方堪悅永者洪元之光萬物之宗也汞宗者赤龍也赤龍者即丹砂也非凡丹砂乃太玄流液二千一百六十年元氣所成號曰虛無真丹也六通圖六者六候一月之法也通者通十二辰知龍虎行藏六合六律六吕産見一十二周之要也知隂陽六候升降訣三日兊越于庚微明八日震起于丁上弦暫停十五日乾健見滿于甲庚十六日巽損入于辛二十三日艮上離麗于丙下弦三十日坤順恂陷子坎革革者隔也夫此日魂月魄若交精萬化在天生萬象在地生萬物在人生萬神在藥生萬靈矣要假三花力四子共相經欲知黃老意祕妙在中庭此言俱説畢學人醒不醒隂陽交映圖夫此日魂月魄若交精萬物自化生要假三花力四子共相經欲知黃老意袐妙在中庭此言俱説畢學人酲不醒古今大同小異配合崔君使天鎮星呼辰星會乾坤立兩弦生育萬物三姓子與崔君法同又元君亦有此法使此法者當日天地元氣交立道之本本即丹田也經曰本立而道生是也諸仙君使熒惑星呼辰星兩箇七十終三旬元氣始交大同不離辰星為元首日月交鉛汞合故經曰和其光同其塵是謂玄同又曰復歸其明此之謂也埏埴圖埏者和也埴者土也經曰埏埴以為器當其無有器之用謂和土以為內外之器內者鼎器也非凡用之鼎器也乃受神汞之鼎器也故隂符經曰爰有竒器是生萬象八卦甲子神機鬼藏此之謂也鬼者癸氣也無用者凡不用之器焉留精于鼎內成三魂魂者龍也龍者木精之神光也按元精經云大道君曰太陽元精是左正之靈與道合并服之身輕而長生又曰火能固物堅存元氣服元精者氣質永固神合元和以通靈焉元者則真火之精也爐郭圖爐郭者外埏埴也如人之城邑居君民也故隂陽萬神憑爐郭感應而立聖功而成還丹三極之道備矣夫北斗隨天輪一日一夜一周行八方鼎轉八門同遊十二辰生化萬靈二精交感四象相生五行相剋相反萬物生矣龍虎還丹萬靈具矣留髓于鼎內載七魄魄者虎也虎者金精金液之神也故玄女謂太一帝君曰以金液金水流注五藏堅滑四肢調養百神潤澤六腑變易毛骨延久生形其力至神足矣神室圖經曰鑿户牗以為室當其無有室之用服上九轉丹居上三天服中九轉丹居中三天服下九轉丹居下三天蓋道氣神感而然矣夫室者非凡室也謂三清神室也三清者經云太清上清玉清之宫室也謂紫微宫紫霞宫紫晨宮三宫者三丹田也上中下三品也三品者小還中還大還三丹立三宫三宫中各三神三三成九宫生三九謂大九轉之室小九轉之田中九轉之宫乃神道所居真人出入居遊之門户覩視之窗牗也皆有八卦大神營衛扶持聖道制惡興善之境也故內景經曰瓊室之中八素雜素者本也八者别也室者青真之室也瓊者霞晨微同體異名也夫曉之者即修生修生者必成真人焉又雜者九天之氣合集之景也三丹神室大九轉第一品紫晨室淺黃地淺緣中九轉第二品紫霞室淺紅地淺緣中黃下九轉第三品青真室一曰紫微室淺青地中黃周易七十二候圖周者三周也三三生九周九周者九還也要在三周日周月周年周産七十二候四時八節二十四氣二十四氣者旦暮一月二氣十二月法産足即運育鉛永成還丹之功也包胎證混元圖在胎戍人證在藥成神證夫色者始爻也始爻者五隂之下一陽潛龍建子之初卦也謂一生二二者丑也一者子也子至丑丑即臨卦也至寅三陽成胎胎者泰也隂陽二氣并和氣三也故經云一生二二生三三生萬物三謂子丑寅發生之氣也故胎者泰也在混沌為天地在人為精血在藥為水火也鼠化牛牛化虎此三象者希夷微也三者混沌出太一經云爾並黃色雞子石英證舍光圖在人證精血成形在藥證鉛汞成丹雞者證金也子者證水也金永者鉛汞也隂符中男少女之道石者堅求止止艮卦也謂殘金衰木含光之諭也英者暑也清淨一物舍五色玄英之令象也故引凡而諭此英出蜀岷山及中國華山即白石英是也映日而光玉矣瑾瑜證神寶圖瑾瑜者五色玉出西海密山即生還丹之類也以證木色之真鉛矣山海經云瑾瑜之玉為良黃帝是食是響乃軒轅服而仙也又經四五色發作説寶玉之符彩玉子靈符曰應赤如雞冠黃如蒸栗白如凝脂青如秦碧黑如玄漆説此之五德五氣以諭還丹金木水火土之色故引為神寶之證神寶即鉛汞也還丹五行功論圖還者還其本體丹者赤色之名五者五星五帝五藏五性五經五味五金五氣五方五色五嶽五行行者亨布也功者通曉之用也論之如後西方庚辛金色白五音商卦兊神白虎令主秋五金銀五味辛氣臭腥象傷星太白嶽華五藏肺通口性主義五經書始數四成數九白元精服之補肺府經曰肺為玉堂尚書府并害器不能傷德伏虎金宿不能窺謂金精制鍊七魄益言氣增性義可通外五金邪氣神帝靈元之益也東方甲乙木色青五音角卦震神青龍令王春五金鉛五味酸氣臭羶象生星嵗嶽泰五藏肝膽通目性主仁五經詩始數三成數八青元精服之補目及內二府二府者肝為清泠宫蘭臺府膽為紫警宫元極府滋三魂明貌目令人逺視益性仁木氣不能淘并害器不能擊隔德伏龍木曜無能窺蓋因木精神帝靈元益也北方壬癸水色黑五音羽卦坎神玄武令主冬五金鐡五味鹹氣臭腐象閉星辰嶽恆五藏腎通耳性主智五經易始數一成數六黑元精服之補耳益腎神經云腎為出故宫名太和府固添髓血滋洞聽令人性智聰潤錬肌毛髮緑隂邪懾水不能漂溺通太隂而合隱出不遊門月輝中無影水曜不能見蓋恃水玉鉛精紫微帝君靈元之益也南方丙丁火色赤五音微卦離神朱省令主夏五金銅五味苦氣臭焦象盛星熒惑嶽衡五藏心通月性主禮經亦禮始數二成數七赤元精服之補心神益陽光鍊固肌骨化隂滯經云心為絳宫元陽府內滋此府外滋目威令人性禮真行不踐迹輕騰凌陽是火等不能燒是陽毒不能熱身與太陽通元而合現化日光類中無影火曜不能察蓋恃炎帝靈元之益也中央戊已土色黃五音宫卦坤神后土令主四季五金黃五味甘氣臭香象舍星鎮嶽嵩五藏脾通鼻性主信經主樂始數五成數十黃元精服之補胃益脾神經云脾為中黃宮太素府益志氣滋性信練五形和九氣加聖惠伏萬幽親五老地不能埋閉土曜不能傍窺蓋恃五星帝威得靈元之益也夫還丹者極一沖二和三舉四旋方五通六達七政八靈九極十具無上之真豈豈不明明可覩其義乎凡人有才貌不可學若過大丹即變見如意故經云無可無不可皆可矣按參同契太易志圖言一象此圖含衆美方得通靈又古經及元君訣并草衣子碧通子變化圖皆鍊丹之名或號如意珠天帝得之為綘宫珠天龍得之為頂上珠鑄劔則伏萬邪萬凶夀杖則殺活自由以一粒磨凡銅鐡鏡能别一切精魅魍魎古藏之物昔黃帝寶鏡亦是也元君曰以一粒書符作法尸解及召集五嶽靈神立至驅策自由元陽子曰乾動還丹成枯樹得再榮人服而長生雲遊紫府庭又古先真曰土石五金悉化成寶枯骨再反朽肉重蘇又古嵩子曰服之者日月長而命益延大海竭而神轉壯又貞白先生白服之飛騰于太清之上逍遙于造化之中看海水為丘陵覩凡生如聚沫此非天地之功實是還丹之力又葛洪真人曰余學道三十餘年覽諸經訣萬有餘卷上古已來髙真上仙無有不以還丹金液為大要也又元君金液訣曰服之一橡斗立成紫磨金身故黃庭曰五符參差同根節又曰三五合氣其本一又八仙歌曰一物舍五彩永作仙人祿又三景訣曰至藥一氣不足與瓦礫無殊何以言之蓋人以五藏元神生命扶身若五藏皆真益則藏府氣和身命益昌錬質存精元氣自固肌膚光瑩神性虛凝永無沈蕩之昧矣若五氣不和則勝負刑性超而身墜性既相歸空身即沈淪是以強弱奔散闕足欺傷不交沖和終無久視之道且如几人身也一脈乖則衆脈亂而患生况五行靈元闕一者乎夫四黃八石五金等非不是天地之精蓋緣五氣不全孤隂寡陽頭硬之物不具五行皆無定性故不可為至藥也可以理病之效無冀長生羽化之用若欲羽化長生須服五色鉛汞丹砂黃芽之藥包含五色五味五行者乃是內明始無而真有也蓋道經曰視不可見聽不足聞用不可既又魏君曰綿綿不斷謂之黃芽變化不窮名曰丹砂又云服之一生不死造化之汞了明留根又青霞子云黃是砂精芽是鉛腳但了宗枝用即不錯又古經曰金丹留形保命全神萬般别法徒為苦辛然若不遇師傳不易措手是故石藥損命悔奚及哉學人君子幸請審之證略無陋焉修真歷驗鈔圖
